<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO 事件知識管理系統｜Dimension D.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+HK:wght@300;400;500;700&display=swap');

:root {
  --bg: #04070f;
  --panel: #080e1c;
  --panel2: #0c1428;
  --border: #152040;
  --border2: #1e3060;
  --accent: #00c8ff;
  --accent2: #ff4060;
  --accent3: #40ffaa;
  --gold: #ffb830;
  --purple: #b060ff;
  --text: #b8cce0;
  --text2: #7090b0;
  --white: #e8f0ff;
  --glow: 0 0 20px rgba(0,200,255,0.35);
  --glow2: 0 0 20px rgba(255,64,96,0.35);
  --glow3: 0 0 20px rgba(64,255,170,0.35);
  --nav-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans HK', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ── Stars bg ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 45%, rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 8%, rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 73% 58%, rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 28%, rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 78%, rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 62% 88%, rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(2px 2px at 82% 18%, rgba(0,200,255,.35) 0%,transparent 100%),
    radial-gradient(2px 2px at 14% 92%, rgba(0,200,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 35%, rgba(176,96,255,.3) 0%,transparent 100%);
}

/* ── Navigation ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: rgba(4,7,15,.96); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 1000;
}
.nav-brand {
  font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 4px;
  color: var(--accent); text-transform: uppercase;
}
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 2px;
  padding: 7px 16px; border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  cursor: pointer; border-radius: 2px; transition: all .2s;
  text-transform: uppercase;
}
.nav-tab:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,.06); }
.nav-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,.1); box-shadow: var(--glow); font-weight: 600; }

/* ── Pages ── */
.page { display: none; min-height: 100vh; padding-top: var(--nav-h); position: relative; z-index: 1; }
.page.active { display: block; }

/* ── Page Header ── */
.page-header {
  text-align: center; padding: 48px 20px 36px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,200,255,.04) 0%, transparent 100%);
}
.page-header .eyebrow { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:5px; color:var(--accent); text-transform:uppercase; margin-bottom:12px; opacity:.8; }
.page-header h1 { font-family:'Orbitron',monospace; font-size:clamp(20px,3.5vw,36px); font-weight:900; color:var(--white); text-shadow:var(--glow); margin-bottom:10px; }
.page-header p { font-size:13px; color:var(--text2); max-width:560px; margin:0 auto; line-height:1.7; }

/* ── Filter Bar ── */
.filter-bar {
  position: sticky; top: var(--nav-h); z-index: 50;
  background: rgba(4,7,15,.96); backdrop-filter:blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
}
.filter-btn {
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px;
  padding:5px 12px; border:1px solid var(--border); background:transparent;
  color:var(--text2); cursor:pointer; border-radius:2px; transition:all .2s; text-transform:uppercase;
}
.filter-btn:hover,.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,200,255,.07); box-shadow:var(--glow); }
.filter-btn.active { font-weight:700; }

/* ══════════════════════════════
   PAGE 1 — MAIN TIMELINE
══════════════════════════════ */
.timeline-wrap { max-width:960px; margin:0 auto; padding:48px 20px; position:relative; }
.tl-spine {
  position:absolute; left:50%; top:0; bottom:0; width:1px;
  background:linear-gradient(180deg,transparent 0%,var(--border2) 5%,var(--border2) 95%,transparent 100%);
  transform:translateX(-50%);
}
.tl-spine::after {
  content:''; position:absolute; left:-1px; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg,transparent 0%,rgba(0,200,255,.12) 30%,rgba(0,200,255,.05) 70%,transparent 100%);
  animation:spineGlow 5s ease-in-out infinite alternate;
}
@keyframes spineGlow { from{opacity:.3} to{opacity:.9} }

.tl-year { position:relative; text-align:center; margin:28px 0 20px; z-index:5; }
.tl-year span { font-family:'Orbitron',monospace; font-size:10px; letter-spacing:4px; color:var(--text2); background:var(--bg); padding:4px 14px; border:1px solid var(--border); border-radius:2px; }

.tl-event { position:relative; width:46%; margin-bottom:40px; transition:opacity .3s; }
.tl-event.left { margin-right:auto; margin-left:0; }
.tl-event.right { margin-left:auto; margin-right:0; }
.tl-event.hidden { opacity:.06; pointer-events:none; }

.tl-event::before {
  content:''; position:absolute; top:22px;
  width:10px; height:10px; background:var(--accent);
  border-radius:50%; box-shadow:0 0 10px var(--accent); z-index:5;
}
.tl-event.left::before { right:-6.5%; }
.tl-event.right::before { left:-6.5%; }
.tl-event::after {
  content:''; position:absolute; top:26px; height:1px; width:6%;
  background:linear-gradient(90deg,var(--accent),var(--border2));
}
.tl-event.left::after { right:-6%; background:linear-gradient(90deg,var(--border2),var(--accent)); }
.tl-event.right::after { left:-6%; }

.tl-card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:3px; padding:18px 20px; cursor:pointer;
  transition:all .22s; position:relative; overflow:hidden;
}
.tl-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,200,255,.025) 0%,transparent 60%); pointer-events:none; }
.tl-card:hover { border-color:var(--accent); box-shadow:var(--glow); transform:translateY(-2px); }

.tl-card .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.cat-badge { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:1.5px; padding:3px 7px; border-radius:2px; text-transform:uppercase; display:inline-block; flex-shrink:0; }
.cat-event { background:rgba(0,200,255,.12); color:var(--accent); border:1px solid rgba(0,200,255,.25); }
.cat-person { background:rgba(255,184,48,.12); color:var(--gold); border:1px solid rgba(255,184,48,.25); }
.cat-org { background:rgba(64,255,170,.12); color:var(--accent3); border:1px solid rgba(64,255,170,.25); }
.cat-tech { background:rgba(176,96,255,.12); color:var(--purple); border:1px solid rgba(176,96,255,.25); }
.cat-now { background:rgba(255,64,96,.12); color:var(--accent2); border:1px solid rgba(255,64,96,.25); }

.importance { display:flex; gap:2px; }
.imp-dot { width:6px; height:6px; border-radius:50%; background:var(--border2); }
.imp-dot.on { background:var(--gold); box-shadow:0 0 4px var(--gold); }

.tl-year-label { font-family:'Orbitron',monospace; font-size:11px; color:var(--text2); margin:6px 0 3px; letter-spacing:1.5px; }
.tl-title { font-size:14px; font-weight:700; color:var(--white); margin-bottom:6px; line-height:1.4; }
.tl-summary { font-size:12px; color:var(--text); line-height:1.7; opacity:.85; }

.tl-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.tl-tag { font-size:10px; color:var(--text2); background:rgba(255,255,255,.04); border:1px solid var(--border); padding:2px 7px; border-radius:2px; }
.tl-tag.person-tag { color:var(--gold); border-color:rgba(255,184,48,.2); cursor:pointer; }
.tl-tag.person-tag:hover { background:rgba(255,184,48,.08); }

.read-more-btn {
  display:inline-flex; align-items:center; gap:6px; margin-top:12px;
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px;
  color:var(--accent); border:1px solid rgba(0,200,255,.3);
  background:rgba(0,200,255,.05); padding:5px 12px; border-radius:2px;
  cursor:pointer; transition:all .2s; text-transform:uppercase;
}
.read-more-btn:hover { background:rgba(0,200,255,.12); box-shadow:var(--glow); }

/* Mobile TL */
@media(max-width:640px){
  .tl-spine{left:18px;}
  .tl-event{width:82%;margin-left:44px!important;margin-right:0!important;}
  .tl-event::before{left:-34px!important;right:auto!important;}
  .tl-event::after{left:-26px!important;right:auto!important;width:20px;background:linear-gradient(90deg,var(--border2),var(--accent))!important;}
}

/* ══════════════════════════════
   PAGE 2 — EVENT ANALYSIS
══════════════════════════════ */
#page-event { background:var(--bg); }
.event-detail-wrap { max-width:860px; margin:0 auto; padding:40px 20px 80px; }

.back-btn {
  display:inline-flex; align-items:center; gap:8px;
  font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px;
  color:var(--text2); border:1px solid var(--border);
  background:transparent; padding:6px 14px; border-radius:2px;
  cursor:pointer; transition:all .2s; margin-bottom:32px; text-transform:uppercase;
}
.back-btn:hover { border-color:var(--accent); color:var(--accent); }

.ev-hero { padding:32px; background:var(--panel); border:1px solid var(--border2); border-radius:4px; margin-bottom:28px; position:relative; overflow:hidden; }
.ev-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
.ev-badge-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.ev-year-big { font-family:'Orbitron',monospace; font-size:13px; color:var(--text2); letter-spacing:3px; }
.ev-title-big { font-family:'Orbitron',monospace; font-size:clamp(16px,2.5vw,26px); font-weight:900; color:var(--white); margin-bottom:12px; line-height:1.3; }
.ev-summary-big { font-size:14px; color:var(--text); line-height:1.8; }

.ev-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
@media(max-width:640px){ .ev-grid{grid-template-columns:1fr;} }

.ev-section { background:var(--panel); border:1px solid var(--border); border-radius:3px; padding:20px; }
.ev-section.full { grid-column:1/-1; }
.ev-section-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }

.ev-section ul { padding-left:14px; }
.ev-section ul li { font-size:13px; color:var(--text); line-height:1.75; margin-bottom:6px; }
.ev-section p { font-size:13px; color:var(--text); line-height:1.8; }

.fact-box { margin-top:0; padding:12px 14px; border-radius:3px; font-size:12px; line-height:1.65; }
.fact-verified { background:rgba(64,255,170,.06); border-left:3px solid var(--accent3); }
.fact-partial { background:rgba(255,184,48,.06); border-left:3px solid var(--gold); }
.fact-unverified { background:rgba(255,64,96,.06); border-left:3px solid var(--accent2); }
.fact-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; display:block; }
.fact-verified .fact-label{color:var(--accent3);} .fact-partial .fact-label{color:var(--gold);} .fact-unverified .fact-label{color:var(--accent2);}

.rel-events { display:flex; flex-wrap:wrap; gap:8px; }
.rel-event-chip {
  font-size:12px; color:var(--accent); background:rgba(0,200,255,.06);
  border:1px solid rgba(0,200,255,.2); padding:5px 12px; border-radius:2px;
  cursor:pointer; transition:all .2s;
}
.rel-event-chip:hover { background:rgba(0,200,255,.12); box-shadow:var(--glow); }

.persons-grid { display:flex; flex-wrap:wrap; gap:10px; }
.person-chip {
  display:flex; align-items:center; gap:8px;
  background:var(--panel2); border:1px solid var(--border);
  padding:8px 12px; border-radius:3px; cursor:pointer; transition:all .2s;
}
.person-chip:hover { border-color:var(--gold); box-shadow:0 0 12px rgba(255,184,48,.2); }
.person-chip .pc-avatar { width:32px; height:32px; border-radius:50%; background:var(--border2); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-size:11px; color:var(--gold); flex-shrink:0; }
.person-chip .pc-name { font-size:12px; font-weight:600; color:var(--white); }
.person-chip .pc-role { font-size:10px; color:var(--text2); }

/* ══════════════════════════════
   PAGE 3 — CHARACTER PROFILES
══════════════════════════════ */
.profiles-wrap { max-width:1100px; margin:0 auto; padding:40px 20px 80px; }
.profiles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

.profile-card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:4px; overflow:hidden; cursor:pointer; transition:all .22s;
}
.profile-card:hover { border-color:var(--gold); box-shadow:0 0 20px rgba(255,184,48,.15); transform:translateY(-2px); }

.profile-header { padding:20px; background:linear-gradient(135deg,var(--panel2) 0%,var(--panel) 100%); position:relative; border-bottom:1px solid var(--border); }
.profile-header::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.6; }
.profile-avatar { width:52px; height:52px; border-radius:50%; background:var(--border2); border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-size:16px; color:var(--gold); margin-bottom:12px; }
.profile-name { font-size:15px; font-weight:700; color:var(--white); margin-bottom:4px; }
.profile-role { font-size:11px; color:var(--accent); font-family:'Orbitron',monospace; letter-spacing:1px; margin-bottom:4px; }
.profile-dates { font-size:11px; color:var(--text2); }

.profile-body { padding:16px 20px; }
.profile-bio { font-size:12px; color:var(--text); line-height:1.7; margin-bottom:12px; }
.profile-events { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.profile-event-tag { font-size:10px; color:var(--accent); background:rgba(0,200,255,.07); border:1px solid rgba(0,200,255,.2); padding:3px 8px; border-radius:2px; cursor:pointer; }
.profile-event-tag:hover { background:rgba(0,200,255,.14); }
.profile-stat { display:flex; gap:16px; padding-top:10px; border-top:1px solid var(--border); }
.p-stat { text-align:center; }
.p-stat-num { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:var(--gold); display:block; }
.p-stat-label { font-size:9px; color:var(--text2); letter-spacing:1px; }

/* Profile Detail Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:2000; overflow-y:auto; padding:40px 20px; }
.modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
.modal-box { background:var(--panel); border:1px solid var(--border2); border-radius:6px; max-width:720px; width:100%; position:relative; overflow:hidden; }
.modal-box::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.modal-close { position:absolute; top:14px; right:14px; background:transparent; border:1px solid var(--border); color:var(--text2); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:14px; transition:all .2s; z-index:10; }
.modal-close:hover { border-color:var(--accent2); color:var(--accent2); }
.modal-header { padding:28px 28px 20px; border-bottom:1px solid var(--border); }
.modal-avatar { width:64px; height:64px; border-radius:50%; background:var(--border2); border:2px solid var(--border2); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',monospace; font-size:20px; color:var(--gold); margin-bottom:14px; }
.modal-name { font-family:'Orbitron',monospace; font-size:clamp(14px,2vw,22px); font-weight:900; color:var(--white); margin-bottom:6px; }
.modal-role { font-size:12px; color:var(--accent); margin-bottom:4px; }
.modal-dates { font-size:12px; color:var(--text2); }
.modal-body { padding:24px 28px; }
.modal-section { margin-bottom:22px; }
.modal-section-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.modal-section ul { padding-left:14px; }
.modal-section ul li { font-size:13px; color:var(--text); line-height:1.75; margin-bottom:5px; }
.modal-section p { font-size:13px; color:var(--text); line-height:1.8; }
.modal-events-list { display:flex; flex-wrap:wrap; gap:6px; }
.modal-ev-tag { font-size:11px; color:var(--accent); background:rgba(0,200,255,.07); border:1px solid rgba(0,200,255,.2); padding:4px 10px; border-radius:2px; cursor:pointer; }
.modal-ev-tag:hover { background:rgba(0,200,255,.14); }

/* ── Stats footer ── */
.stats-bar { display:flex; gap:24px; justify-content:center; flex-wrap:wrap; padding:24px 20px; border-top:1px solid var(--border); background:rgba(8,14,28,.8); position:relative; z-index:1; }
.stat-item { text-align:center; }
.stat-num { font-family:'Orbitron',monospace; font-size:26px; font-weight:900; color:var(--accent); display:block; text-shadow:var(--glow); }
.stat-label { font-size:10px; color:var(--text2); letter-spacing:1px; }

/* Search box */
.search-wrap { max-width:460px; margin:0 auto 20px; position:relative; }
.search-input {
  width:100%; background:var(--panel); border:1px solid var(--border2);
  color:var(--white); font-size:13px; padding:10px 14px 10px 36px;
  border-radius:3px; outline:none; transition:border-color .2s; font-family:'Noto Sans HK',sans-serif;
}
.search-input:focus { border-color:var(--accent); box-shadow:var(--glow); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:13px; pointer-events:none; }

/* Utility */
.empty-msg { text-align:center; padding:60px 20px; color:var(--text2); font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; }
</style>
</head>
<body>

<!-- ── Navigation ── -->
<nav>
  <div class="nav-brand">UFO · EKMS</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('timeline',this)">主時間軸</button>
    <button class="nav-tab" onclick="showPage('event',this)">事件剖析</button>
    <button class="nav-tab" onclick="showPage('profiles',this)">人物檔案</button>
  </div>
</nav>

<!-- ══ PAGE 1: MAIN TIMELINE ══ -->
<div id="page-timeline" class="page active">
  <div class="page-header">
    <div class="eyebrow">Event Knowledge Management System</div>
    <h1>主時間軸</h1>
    <p>從1908年通古斯大爆炸到2026年五角大廈解密，以時間軸方式快速瀏覽整體事件脈絡</p>
  </div>
  <div class="filter-bar" id="tl-filters">
    <button class="filter-btn active" onclick="filterTL('all',this)">全部</button>
    <button class="filter-btn" onclick="filterTL('event',this)">重大事件</button>
    <button class="filter-btn" onclick="filterTL('person',this)">關鍵人物</button>
    <button class="filter-btn" onclick="filterTL('org',this)">秘密組織</button>
    <button class="filter-btn" onclick="filterTL('tech',this)">科技發現</button>
    <button class="filter-btn" onclick="filterTL('now',this)">揭密浪潮</button>
  </div>
  <div class="timeline-wrap">
    <div class="tl-spine"></div>
    <div id="tl-container"></div>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num">79</span><span class="stat-label">年跨度</span></div>
    <div class="stat-item"><span class="stat-num">35+</span><span class="stat-label">事件節點</span></div>
    <div class="stat-item"><span class="stat-num">30+</span><span class="stat-label">人物檔案</span></div>
    <div class="stat-item"><span class="stat-num">4</span><span class="stat-label">影片來源</span></div>
  </div>
</div>

<!-- ══ PAGE 2: EVENT ANALYSIS ══ -->
<div id="page-event" class="page">
  <div class="page-header">

    notes:'電話資料被「遠端清除」的細節特別值得注意——這意味著有人在她失蹤後主動消除了她手機中的資訊。'
  },
  {
    id:'p_reza',name:'莫妮卡·雷薩',nameEn:'Monica Jacinto-Reza',
    role:'航太工程師・先進火箭推進材料專家',born:'未知',died:'（失蹤）',
    nationality:'美國',cat:'missing',
    avatar:'MR',
    bio:'前Aerojet Rocketdyne航太公司技術研究員，先進火箭推進材料專家，曾發明一種力場超合金，與UFO逆向工程中所需的極限耐熱材料高度相關。2025年6月22日在加州與朋友行山，相距僅10米，朋友一轉身她已不見。事後出動直升機和搜救犬，一無所獲。',
    events:['e25'],
    relPersons:[],
    notes:'Reza的失蹤方式（在同伴10米範圍內瞬間消失）是所有案件中最詭異的，被形容為「人間蒸發」。'
  }
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let tlFilter = 'all';
let profileFilter = 'all';
let profileSearch = '';

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════
function renderTimeline() {
  const c = document.getElementById('tl-container');
  c.innerHTML = '';
  let lastYear = '';
  EVENTS.forEach(ev => {
    const yp = ev.year;
    if (yp !== lastYear) {
      const m = document.createElement('div');
      m.className = 'tl-year';
      m.innerHTML = `<span>${ev.date.replace(/\.\d+$/,'')}</span>`;
      c.appendChild(m);
      lastYear = yp;
    }
    const d = document.createElement('div');
    d.className = `tl-event ${ev.side}`;
    d.dataset.cat = ev.cat;
    if (tlFilter !== 'all' && ev.cat !== tlFilter) d.classList.add('hidden');

    const impDots = [1,2,3,4,5].map(i =>
      `<span class="imp-dot${i <= ev.importance ? ' on' : ''}"></span>`).join('');

    const personTags = ev.persons.map(pid => {
      const p = PERSONS.find(x => x.id === pid);
      return p ? `<span class="tl-tag person-tag" onclick="openPersonModal('${pid}');event.stopPropagation()">${p.name}</span>` : '';
    }).join('');

    d.innerHTML = `
      <div class="tl-card">
        <div class="card-top">
          <span class="cat-badge cat-${ev.cat}">${ev.catLabel}</span>
          <div class="importance">${impDots}</div>
        </div>
        <div class="tl-year-label">${ev.year}</div>
        <div class="tl-title">${ev.title}</div>
        <div class="tl-summary">${ev.summary}</div>
        ${personTags ? `<div class="tl-meta">${personTags}</div>` : ''}
        <button class="read-more-btn" onclick="openEvent('${ev.id}');event.stopPropagation()">
          深度剖析 →
        </button>
      </div>`;
    c.appendChild(d);
  });
}

function filterTL(cat, btn) {
  tlFilter = cat;
  document.querySelectorAll('#tl-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tl-event').forEach(el => {
    el.classList.toggle('hidden', cat !== 'all' && el.dataset.cat !== cat);
  });
}

// ═══════════════════════════════════════
// EVENT DETAIL
// ═══════════════════════════════════════
function openEvent(id) {
  const ev = EVENTS.find(e => e.id === id);
  if (!ev) return;

  const d = ev.fullDetail;
  const navBtns = document.querySelectorAll('.nav-tab');
  showPage('event', navBtns[1]);

  const personCards = ev.persons.map(pid => {
    const p = PERSONS.find(x => x.id === pid);
    if (!p) return '';
    return `<div class="person-chip" onclick="openPersonModal('${pid}')">
      <div class="pc-avatar">${p.avatar}</div>
      <div><div class="pc-name">${p.name}</div><div class="pc-role">${p.role.split('・')[0]}</div></div>
    </div>`;
  }).join('');

  const relChips = ev.relEvents.map(rid => {
    const r = EVENTS.find(e => e.id === rid);
    return r ? `<span class="rel-event-chip" onclick="openEvent('${rid}')">${r.title}</span>` : '';
  }).join('');

  const timelineHTML = d.timeline.map(t => `<li>${t}</li>`).join('');
  const factHTML = d.factCheck ?
    `<div class="fact-box fact-${d.factCheck.type}">
      <span class="fact-label">${d.factCheck.type === 'verified' ? '✅ 可核實' : d.factCheck.type === 'partial' ? '⚠️ 部分屬實' : '❌ 無法核實'}</span>
      ${d.factCheck.text}
    </div>` : '';

  document.getElementById('event-detail-content').innerHTML = `
    <button class="back-btn" onclick="showPage('timeline',document.querySelectorAll('.nav-tab')[0])">← 返回時間軸</button>
    <div class="ev-hero">
      <div class="ev-badge-row">
        <span class="cat-badge cat-${ev.cat}">${ev.catLabel}</span>
        <span class="ev-year-big">${ev.year}</span>
      </div>
      <div class="ev-title-big">${ev.title}</div>
      <div class="ev-summary-big">${ev.summary}</div>
    </div>

    <div class="ev-grid">
      <div class="ev-section full">
        <div class="ev-section-title">完整時間線</div>
        <ul>${timelineHTML}</ul>
      </div>

      ${d.background ? `<div class="ev-section">
        <div class="ev-section-title">背景脈絡</div>
        <p>${d.background}</p>
      </div>` : ''}

      ${d.impact ? `<div class="ev-section">
        <div class="ev-section-title">後續影響</div>
        <p>${d.impact}</p>
      </div>` : ''}

      ${d.analysis ? `<div class="ev-section">
        <div class="ev-section-title">深度分析</div>
        <p>${d.analysis}</p>
      </div>` : ''}

      ${factHTML ? `<div class="ev-section">
        <div class="ev-section-title">可核實程度</div>
        ${factHTML}
      </div>` : ''}

      ${personCards ? `<div class="ev-section full">
        <div class="ev-section-title">涉及人物</div>
        <div class="persons-grid">${personCards}</div>
      </div>` : ''}

      ${relChips ? `<div class="ev-section full">
        <div class="ev-section-title">關聯事件</div>
        <div class="rel-events">${relChips}</div>
      </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════
// PROFILES
// ═══════════════════════════════════════
function renderProfiles() {
  const grid = document.getElementById('profiles-grid');
  let list = PERSONS.filter(p => {
    const catMatch = profileFilter === 'all' || p.cat === profileFilter;
    const searchMatch = !profileSearch || [p.name, p.nameEn, p.role, p.bio].join(' ').toLowerCase().includes(profileSearch.toLowerCase());
    return catMatch && searchMatch;
  });

  if (!list.length) {
    grid.innerHTML = '<div class="empty-msg">沒有符合條件的人物</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const evCount = p.events.length;
    const evTags = p.events.slice(0,3).map(eid => {
      const ev = EVENTS.find(e => e.id === eid);
      return ev ? `<span class="profile-event-tag" onclick="openEvent('${eid}');event.stopPropagation()">${ev.title.slice(0,18)}…</span>` : '';
    }).join('');
    return `
      <div class="profile-card" onclick="openPersonModal('${p.id}')">
        <div class="profile-header">
          <div class="profile-avatar">${p.avatar}</div>
          <div class="profile-name">${p.name}</div>
          <div class="profile-role">${p.role.split('・')[0]}</div>
          <div class="profile-dates">${p.born || '出生年份不詳'} ${p.died ? '— ' + p.died : ''}</div>
        </div>
        <div class="profile-body">
          <div class="profile-bio">${p.bio.slice(0,120)}…</div>
          <div class="profile-events">${evTags}</div>
          <div class="profile-stat">
            <div class="p-stat"><span class="p-stat-num">${evCount}</span><span class="p-stat-label">關聯事件</span></div>
            <div class="p-stat"><span class="p-stat-num">${p.relPersons.length}</span><span class="p-stat-label">關係人物</span></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterProfiles(cat, btn) {
  profileFilter = cat;
  document.querySelectorAll('.filter-bar .filter-btn').forEach(b => {
    if (b.closest('#page-profiles')) b.classList.remove('active');
  });
  btn.classList.add('active');
  renderProfiles();
}

function searchProfiles(q) {
  profileSearch = q;
  renderProfiles();
}

// ═══════════════════════════════════════
// PROFILE MODAL
// ═══════════════════════════════════════
function openPersonModal(id) {
  const p = PERSONS.find(x => x.id === id);
  if (!p) return;

  const evCards = p.events.map(eid => {
    const ev = EVENTS.find(e => e.id === eid);
    return ev ? `<span class="modal-ev-tag" onclick="openEvent('${eid}');closeModalBtn()">${ev.title}</span>` : '';
  }).join('');

  const relCards = p.relPersons.map(rid => {
    const r = PERSONS.find(x => x.id === rid);
    return r ? `<span class="modal-ev-tag" onclick="openPersonModal('${rid}')">${r.name}</span>` : '';
  }).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar">${p.avatar}</div>
      <div class="modal-name">${p.name}</div>
      <div class="modal-role">${p.role}</div>
      <div class="modal-dates">${p.nationality || ''} ${p.born ? '· 生於 ' + p.born : ''} ${p.died ? '· ' + p.died : ''}</div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">個人簡介</div>
        <p>${p.bio}</p>
      </div>
      ${p.notes ? `<div class="modal-section">
        <div class="modal-section-title">備註</div>
        <p>${p.notes}</p>
      </div>` : ''}
      ${evCards ? `<div class="modal-section">
        <div class="modal-section-title">關聯事件（${p.events.length}）</div>
        <div class="modal-events-list">${evCards}</div>
      </div>` : ''}
      ${relCards ? `<div class="modal-section">
        <div class="modal-section-title">關係人物</div>
        <div class="modal-events-list">${relCards}</div>
      </div>` : ''}
    </div>`;

  document.getElementById('profile-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('profile-modal')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('profile-modal').classList.remove('open');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderTimeline();
renderProfiles();
</script>
</body>
</html>
