<!DOCTYPE html>
<html lang="zh-HK">
<head><link rel="icon" href="logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO 揭密時代｜完整時間線</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+HK:wght@300;400;500;700&display=swap');

  :root {
    --bg: #050810;
    --panel: #0a1020;
    --border: #1a3060;
    --accent: #00c8ff;
    --accent2: #ff4060;
    --accent3: #40ff90;
    --text: #c8d8f0;
    --muted: #607090;
    --gold: #ffc040;
    --glow: 0 0 20px rgba(0,200,255,0.4);
    --glow2: 0 0 20px rgba(255,64,96,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans HK', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 20%, rgba(0,200,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 90%, rgba(0,200,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,200,255,0.05) 0%, transparent 100%);
  }

  header .subtitle {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    text-shadow: var(--glow);
    margin-bottom: 12px;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* Filter Tabs */
  .filters {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,8,16,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,200,255,0.08);
    box-shadow: var(--glow);
  }

  .filter-btn.active { font-weight: 700; }

  /* Timeline container */
  .timeline-wrapper {
    position: relative;
    z-index: 10;
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 20px;
  }

  /* Central spine */
  .timeline-spine {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(180deg,
      transparent 0%,
      var(--border) 5%,
      var(--border) 95%,
      transparent 100%
    );
    transform: translateX(-50%);
  }

  .timeline-spine::after {
    content: '';
    position: absolute;
    left: -1px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(0,200,255,0.15) 20%,
      rgba(0,200,255,0.05) 80%,
      transparent 100%
    );
    animation: spineGlow 4s ease-in-out infinite alternate;
  }

  @keyframes spineGlow {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }

  /* Event card */
  .event {
    position: relative;
    width: 46%;
    margin-bottom: 48px;
    transition: opacity 0.3s, transform 0.3s;
  }

  .event.left { margin-right: auto; margin-left: 0; }
  .event.right { margin-left: auto; margin-right: 0; }

  .event.hidden { opacity: 0.08; pointer-events: none; }

  /* Connector dot on spine */
  .event::before {
    content: '';
    position: absolute;
    top: 24px;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    z-index: 5;
  }

  .event.left::before { right: -6.5%; }
  .event.right::before { left: -6.5%; }

  /* Connector line */
  .event::after {
    content: '';
    position: absolute;
    top: 28px;
    height: 1px;
    background: linear-gradient(90deg, var(--border), var(--accent));
    width: 6%;
  }

  .event.left::after { right: -6%; background: linear-gradient(90deg, var(--accent), var(--border)); }
  .event.right::after { left: -6%; }

  .event-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .event-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,200,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .event-card:hover {
    border-color: var(--accent);
    box-shadow: var(--glow);
    transform: translateY(-2px);
  }

  .event-card.expanded {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  /* Category badge */
  .cat-badge {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 8px;
  }

  .cat-event { background: rgba(0,200,255,0.15); color: var(--accent); border: 1px solid rgba(0,200,255,0.3); }
  .cat-person { background: rgba(255,192,64,0.15); color: var(--gold); border: 1px solid rgba(255,192,64,0.3); }
  .cat-org { background: rgba(64,255,144,0.15); color: var(--accent3); border: 1px solid rgba(64,255,144,0.3); }
  .cat-tech { background: rgba(160,80,255,0.15); color: #c080ff; border: 1px solid rgba(160,80,255,0.3); }
  .cat-now { background: rgba(255,64,96,0.15); color: var(--accent2); border: 1px solid rgba(255,64,96,0.3); }

  .event-year {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }

  .event-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .event-summary {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    opacity: 0.85;
  }

  /* Expanded detail */
  .event-detail {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
  }

  .event-detail.open { display: block; }

  .event-detail h4 {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 12px 0 6px;
  }

  .event-detail ul {
    padding-left: 16px;
  }

  .event-detail ul li {
    margin-bottom: 6px;
    opacity: 0.9;
  }

  .fact-check {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 3px;
    font-size: 12px;
    line-height: 1.6;
  }

  .fact-verified { background: rgba(64,255,144,0.08); border-left: 3px solid var(--accent3); }
  .fact-partial { background: rgba(255,192,64,0.08); border-left: 3px solid var(--gold); }
  .fact-unverified { background: rgba(255,64,96,0.08); border-left: 3px solid var(--accent2); }

  .fact-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }

  .fact-verified .fact-label { color: var(--accent3); }
  .fact-partial .fact-label { color: var(--gold); }
  .fact-unverified .fact-label { color: var(--accent2); }

  /* Year markers */
  .year-marker {
    position: relative;
    text-align: center;
    margin: 32px 0 24px;
    z-index: 5;
  }

  .year-marker span {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    background: var(--bg);
    padding: 4px 16px;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  /* Toggle icon */
  .toggle-icon {
    float: right;
    width: 18px;
    height: 18px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.2s;
    margin-top: 2px;
  }

  .event-card:hover .toggle-icon,
  .event-card.expanded .toggle-icon {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,16,32,0.8);
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    display: block;
    text-shadow: var(--glow);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .timeline-spine { left: 20px; }
    .event { width: 85%; margin-left: 48px !important; margin-right: 0 !important; }
    .event::before { left: -36px !important; right: auto !important; }
    .event::after { left: -28px !important; right: auto !important; width: 22px; background: linear-gradient(90deg, var(--border), var(--accent)) !important; }
  }
</style>
</head>

let currentFilter = 'all';

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = '';

  let lastYear = '';

  events.forEach((ev, idx) => {
    const yearPrefix = ev.year.replace(/年.*/, '年');
    if (yearPrefix !== lastYear) {
      const marker = document.createElement('div');
      marker.className = 'year-marker';
      marker.innerHTML = `<span>${yearPrefix.replace('年', '')}</span>`;
      container.appendChild(marker);
      lastYear = yearPrefix;
    }

    const div = document.createElement('div');
    div.className = `event ${ev.side}`;
    div.dataset.cat = ev.cat;

    if (currentFilter !== 'all' && ev.cat !== currentFilter) {
      div.classList.add('hidden');
    }

    div.innerHTML = `
      <div class="event-card" onclick="toggleEvent(this)">
        <span class="toggle-icon">+</span>
        <div class="cat-badge cat-${ev.cat}">${ev.catLabel}</div>
        <div class="event-year">${ev.year}</div>
        <div class="event-title">${ev.title}</div>
        <div class="event-summary">${ev.summary}</div>
        <div class="event-detail">${ev.detail}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

function toggleEvent(card) {
  const detail = card.querySelector('.event-detail');
  const icon = card.querySelector('.toggle-icon');
  const isOpen = detail.classList.contains('open');

  // Close all
  document.querySelectorAll('.event-detail.open').forEach(d => {
    d.classList.remove('open');
    d.closest('.event-card').classList.remove('expanded');
    d.closest('.event-card').querySelector('.toggle-icon').textContent = '+';
  });

  if (!isOpen) {
    detail.classList.add('open');
    card.classList.add('expanded');
    icon.textContent = '−';
  }
}

function filterEvents(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.event').forEach(ev => {
    if (cat === 'all' || ev.dataset.cat === cat) {
      ev.classList.remove('hidden');
    } else {
      ev.classList.add('hidden');
    }
  });
}

renderTimeline();
</script>
</body>
</html>
